<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC Wallet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="topbar">
      <div>
        <h1>BC Wallet</h1>
        <p>Sua carteira descentralizada</p>
      </div>

      <div class="avatar">BC</div>
    </header>

    <section class="balance-card">
      <p>Saldo Total</p>
      <h2 id="balance">0.0000 BC</h2>

      <div class="wallet-address" id="walletAddress">
        Nenhuma wallet conectada
      </div>
    </section>

    <section class="actions">
      <button id="createWallet">Criar Wallet</button>
      <button id="importWallet" class="secondary">Importar</button>
    </section>

    <section class="wallet-box hidden" id="walletBox">

      <div class="info-card">
        <h3>Seed Phrase</h3>
        <textarea id="mnemonic" readonly></textarea>
      </div>

      <div class="info-card">
        <h3>Private Key</h3>
        <textarea id="privateKey" readonly></textarea>
      </div>

      <div class="info-card">
        <h3>Endereço</h3>
        <textarea id="address" readonly></textarea>
      </div>

    </section>

    <nav class="bottom-nav">
      <button>🏠</button>
      <button>💸</button>
      <button>📈</button>
      <button>⚙️</button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC Wallet</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:350px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

pre{
  white-space:pre-wrap;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

<h1>BC Wallet</h1>

<button onclick="createWallet()">
Gerar Wallet
</button>

<pre id="result"></pre>

</div>

<script>
async function createWallet(){

  const res = await fetch('/api/wallet');

  const data = await res.json();

  document.getElementById('result').innerText =
JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
